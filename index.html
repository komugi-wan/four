<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f48fb1">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <title>Ultimate Chord & Sheet Music Editor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --primary: #f48fb1;
            --primary-light: #fff1f5; --secondary: #455a64;
            --bg: #fdfafb; --text: #2c3e50; --border: #e0e0e0;
            --shadow: 0 4px 15px rgba(0,0,0,0.05); --accent-soft: #f8bbd0;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent;
        }
        body { 
            font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
            background: var(--bg); 
            color: var(--text); 
            padding: 10px; 
            padding-bottom: env(safe-area-inset-bottom);
            margin: 0;
            line-height: 1.5; 
            overflow-x: hidden;
        }
        .container { 
            max-width: 800px;
            margin: auto; 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: var(--shadow); 
            padding-bottom: 100px; 
            min-height: 90vh;
        }
        .tabs { 
            display: flex;
            gap: 5px; 
            margin-bottom: 15px; 
            background: #f1f3f5; 
            padding: 4px; 
            border-radius: 10px; 
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
        .tab { 
            flex: 1;
            padding: 10px 5px; 
            text-align: center; 
            cursor: pointer; 
            border-radius: 8px; 
            transition: 0.3s; 
            font-size: 0.85rem; 
            color: #888; 
            white-space: nowrap;
        }
        .tab.active { background: white; color: var(--primary); font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .content { display: none;
            animation: fadeIn 0.3s ease; }
        .content.active { display: block;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1;
        } }
        
        h2 { text-align: center;
            color: var(--secondary); margin: 5px 0 15px; font-size: 1.1rem; }
        .section { margin-bottom: 12px;
        }
        .label { font-weight: bold; margin-bottom: 6px; display: block; color: #90a4ae; font-size: 0.7rem;
            letter-spacing: 0.05em; text-transform: uppercase; }
        
        .btn-group { display: grid;
            grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 6px; }
        
        /* ルート音選択用の特別なグリッド: 12音を効率的に配置 */
        #rootGroup { 
            grid-template-columns: repeat(6, 1fr); 
            gap: 4px;
        }
        
        button { 
            padding: 10px 2px;
            border: 1px solid var(--border); 
            background: #fff;
            border-radius: 6px; 
            cursor: pointer; 
            transition: all 0.1s; 
            font-size: 0.85rem; 
            font-weight: 500; 
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        button:active { background-color: #f8f9fa; transform: translateY(1px);
        }
        button.active { 
            background: var(--primary);
            color: white; 
            border-color: var(--primary); 
            box-shadow: 0 2px 6px rgba(244, 143, 177, 0.3);
        }
        
        .btn-root {
            font-size: 0.85rem;
            min-height: 40px;
        }

        #result-area { 
            margin-top: 15px;
            padding: 12px; 
            background: var(--primary-light); 
            border-radius: 12px; 
            text-align: center; 
            border: 2px solid var(--primary);
        }
        
        .modal { 
            display: none;
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); 
            z-index: 1000; 
            overflow-y: auto; 
            padding: 10px;
            backdrop-filter: blur(2px);
        }
        .modal-content { 
            background: white;
            max-width: 500px; 
            margin: auto; 
            padding: 15px; 
            border-radius: 15px; 
            position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-top: 20px;
        }
        .modal-close { 
            position: absolute;
            top: 10px; right: 10px; 
            background: #eee; border-radius: 50%; 
            width: 28px; height: 28px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer;
            z-index: 10;
            font-size: 18px;
        }
        
        .chord-title { font-size: 1.5rem;
            font-weight: bold; color: var(--secondary); line-height: 1; margin-bottom: 4px; }
        .notes-display { font-size: 0.85rem;
            color: var(--primary); font-weight: 500; }
        
        .sheet-header-sticky { 
            position: sticky;
            top: 48px; 
            background: white; 
            z-index: 90; 
            padding-top: 5px; 
            border-bottom: 1px solid #f1f3f5; 
            margin-bottom: 15px;
        }
        .sheet-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            background: var(--primary-light);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .current-song-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 70%;
        }
        .btn-settings {
            background: none;
            border: none;
            font-size: 1.2rem;
            padding: 5px;
            color: var(--secondary);
        }

        .section-nav { display: flex;
            gap: 8px; overflow-x: auto; padding: 8px 0;
            white-space: nowrap; -webkit-overflow-scrolling: touch;
        }
        .section-nav-item { padding: 8px 14px; background: var(--primary-light); border-radius: 20px; font-size: 0.75rem;
            color: var(--primary); cursor: pointer; font-weight: bold; border: 1px solid var(--accent-soft);
        }
        
        select, .input-text { 
            width: 100%;
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #ddd; 
            font-size: 16px;
            outline: none; 
            background-color: #fff;
        }
        select:focus, .input-text:focus { border-color: var(--primary);
        }
        
        .section-block { border: 2px solid #fce4ec;
            border-radius: 12px; padding: 12px; margin-bottom: 30px; background: #fff; }
        .section-header-container { margin-bottom: 15px;
            display: flex; align-items: center; gap: 6px; }
        .section-header-input { border: none; background: var(--secondary);
            color: white; font-weight: bold; font-size: 0.8rem; padding: 10px 12px; border-radius: 6px; flex-grow: 1;
        }
        
        .measure-row { 
            display: flex;
            flex-direction: column; background: #fff; 
            border: 1px solid var(--border); margin-bottom: 8px; 
            padding: 8px; border-radius: 10px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            position: relative; 
            transition: transform 0.2s, opacity 0.2s;
            touch-action: pan-y;
            cursor: grab;
        }
        .measure-row.dragging { opacity: 0.5; cursor: grabbing;
        }
        .measure-row.swiping { transition: none;
        }
        
        .measure-grid { display: flex;
            gap: 6px; width: 100%; }
        .beat-box { 
            flex: 1;
            min-height: 60px;
            border: 1px solid #f1f3f5;
            padding: 4px; 
            text-align: center; cursor: pointer; 
            border-radius: 8px; display: flex; flex-direction: column; 
            justify-content: center;
            background: #fafafa; transition: 0.2s;
            user-select: none;
        }
        .beat-box.selected { border: 2px solid var(--primary); background: var(--primary-light);
        }
        
        .chord-display-area { width: 100%;
            height: 100%; display: flex; flex-direction: column; justify-content: center; }
        .beat-chord { font-weight: bold;
            font-size: 1rem; color: var(--secondary); display: block; min-height: 1.2em; word-break: break-all;
        }
        .beat-notes { font-size: 0.6rem; color: #999; display: block; min-height: 1.2em; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap; }
        
        .lyrics-input { width: 100%;
            margin-top: 8px; padding: 6px 4px; border: none; border-bottom: 2px solid #eee; outline: none; font-size: 0.85rem; background: transparent;
        }
        .lyrics-input:focus { border-bottom-color: var(--primary);
        }
        
        .btn-main { 
            background: var(--secondary);
            color: white; width: 100%; 
            margin-top: 8px; padding: 12px; 
            font-weight: bold; border: none; border-radius: 10px; cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-add-measure { background: #eceff1; color: #455a64; margin-top: 5px; padding: 10px; font-size: 0.8rem;
            border: 1px dashed #cfd8dc; }
        
        .save-list { margin-top: 20px;
            border-top: 2px dashed #eee; padding-top: 20px; }
        .save-item { display: flex; justify-content: space-between;
            align-items: center; padding: 15px; background: #fff; border: 1px solid #eee; border-radius: 12px; margin-bottom: 10px;
        }
        .save-item-info { flex-grow: 1; cursor: pointer; margin-right: 10px;
        }
        .btn-sm { padding: 8px 12px; font-size: 0.75rem; border: 1px solid #ddd;
            border-radius: 6px; background: #fff; cursor: pointer; }
        .btn-del { border-color: #ffcdd2; color: #e57373;
        }
        
        .grid-2 { display: grid;
            grid-template-columns: 1fr; gap: 0; }
        @media (min-width: 600px) { 
            .grid-2 { grid-template-columns: 1fr 1fr;
                gap: 15px; } 
            .tab { font-size: 0.95rem;
            }
        }

        /* 追記: キー別コードセット用のスタイル */
        .key-chord-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin-bottom: 10px;
        }
        .btn-key-chord {
            background-color: #fff9fb;
            border-color: #fce4ec;
            font-size: 0.75rem;
            color: var(--primary);
            padding: 8px 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <div class="tab" onclick="uiManager.switchTab('selector')">コード確認</div>
        <div class="tab active" onclick="uiManager.switchTab('sheet')">楽譜作成</div>
        <div class="tab" onclick="uiManager.switchTab('library')">保存リスト</div>
    </div>

    <div id="selector" class="content">
        <div id="selectorInner">
            <h2 id="selectorTitle">Chord Visualizer 🎹</h2>
            
            <div id="keyChordSection" class="section" style="display: none;">
                <span class="label">RECOMMENDED (FOR CURRENT KEY)</span>
                <div id="keyChordGroup" class="key-chord-group"></div>
            </div>

            <div class="section">
                <span class="label">ROOT</span>
                <div class="btn-group" id="rootGroup"></div>
            </div>
            <div class="grid-2">
                <div class="section">
                    <span class="label">QUALITY</span>
                    <div class="btn-group" id="qualityGroup">
                        <button class="active" data-val="maj">Major</button>
                        <button data-val="m">m</button>
                        <button data-val="aug">aug</button>
                        <button data-val="dim">dim</button>
                        <button data-val="sus4">sus4</button>
                    </div>
                </div>
                <div class="section">
                    <span class="label">7th</span>
                    <div class="btn-group" id="seventhGroup">
                        <button class="active" data-val="none">None</button>
                        <button data-val="7">7</button>
                        <button data-val="M7">M7</button>
                        <button data-val="dim7">dim7</button>
                    </div>
                </div>
            </div>
            <div class="section">
                <span class="label">TENSIONS</span>
                <div class="btn-group" id="tensionGroup">
                    <button data-val="b5">b5</button>
                    <button data-val="9">9</button>
                    <button data-val="add9">add9</button>
                    <button data-val="11">11</button>
                    <button data-val="#11">#11</button>
                    <button data-val="13">13</button>
                </div>
            </div>
            <div id="result-area">
                <div class="chord-title" id="chordName">C</div>
                <div class="notes-display" id="notes">ド - ミ - ソ</div>
                
                <div id="modalControls" style="display:none; display: flex; gap: 8px; margin-top: 10px;">
                    <button class="btn-main" style="background:#cfd8dc; color:#455a64; margin-top:0;" onclick="chordEngine.clearChord()">削除</button>
                    <button class="btn-main" style="background:var(--primary); margin-top:0;" onclick="sheetEditor.closeChordModal()">確定</button>
                </div>
            </div>
        </div>
    </div>

    <div id="sheet" class="content active">
        <div class="sheet-header-sticky">
            <div class="sheet-info-bar">
                <div class="current-song-title" id="displaySongTitle">無題の楽譜</div>
                <button class="btn-settings" onclick="uiManager.openSettingsModal()">⚙️</button>
            </div>
            <div id="sectionNav" class="section-nav"></div>
        </div>
        <div id="masterContainer"></div>
        <button class="btn-main" onclick="sheetEditor.addSectionBlock()">+ セクションを追加</button>
    </div>

    <div id="library" class="content">
        <h2>Saved Songs 📂</h2>
        <button class="btn-main" style="background:var(--primary); margin-bottom:20px;" onclick="storageManager.createNewSong()">+ 新しく曲を作る</button>
        <div id="saveListContainer" class="save-list"></div>
    </div>
</div>

<div id="chordModal" class="modal">
    <div class="modal-content">
        <div class="modal-close" onclick="sheetEditor.closeChordModal()">×</div>
        <div id="modalInjectionPoint"></div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <div class="modal-close" onclick="uiManager.closeSettingsModal()">×</div>
        <h2 style="font-size: 1.1rem;">楽曲設定</h2>
        <div class="section">
            <span class="label">TITLE</span>
            <input type="text" id="songTitle" class="input-text" placeholder="曲のタイトルを入力..." oninput="uiManager.syncTitleDisplay(); storageManager.requestAutoSave();">
        </div>
        <div class="grid-2">
            <div class="section">
                <span class="label">KEY</span>
                <select id="songKey" onchange="theoryEngine.updateRecommendedChords(); storageManager.requestAutoSave();">
                    <option value="C">C Major / A minor</option>
                    <option value="C#">C# Major / A# minor</option>
                    <option value="D">D Major / B minor</option>
                    <option value="Eb">Eb Major / C minor</option>
                    <option value="E">E Major / C# minor</option>
                    <option value="F">F Major / D minor</option>
                    <option value="F#">F# Major / D# minor</option>
                    <option value="G">G Major / E minor</option>
                    <option value="Ab">Ab Major / F minor</option>
                    <option value="A">A Major / F# minor</option>
                    <option value="Bb">Bb Major / G minor</option>
                    <option value="B">B Major / G# minor</option>
                </select>
            </div>
            <div class="section">
                <span class="label">BEAT</span>
                <select id="timeSignature" onchange="sheetEditor.resetSheetByBeatChange()">
                    <option value="4">4/4</option>
                    <option value="3">3/4</option>
                </select>
            </div>
        </div>
        <button class="btn-main" onclick="uiManager.closeSettingsModal()">完了</button>
    </div>
</div>

<script>
/**
 * GLOBAL CONSTANTS & MAPS
 */
const MUSIC_CONSTANTS = {
    // 内部計算用の12音インデックス
    NOTE_INDEX_MAP: { 
        "C": 0, "C#": 1, "Db": 1, "D": 2, "D#": 3, "Eb": 3, "E": 4, 
        "F": 5, "F#": 6, "Gb": 6, "G": 7, "G#": 8, 
        "Ab": 8, "A": 9, 
        "A#": 10, "Bb": 10, "B": 11 
    },
    // 表示用のカナマップ
    KANA_MAP: { 
        "C": "ド", "C#": "ド#", "Db": "レb", "D": "レ", "D#": "レ#", "Eb": "ミb", 
        "E": "ミ", "F": "ファ", "F#": "ファ#", "Gb": "ソb", "G": "ソ", "G#": "ソ#", 
        "Ab": "ラb", "A": "ラ", "A#": "ラ#", "Bb": "シb", "B": "シ" 
    },
    // 生成時に使用するデフォルト配列
    NOTES_FULL: ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"],
    NOTES_FLAT: ["C", "Db", "D", "Eb", "E", "F", "Gb", "G", "Ab", "A", "Bb", "B"]
};

/**
 * APPLICATION STATE
 */
let appState = {
    currentChord: {
        root: "C",
        quality: "maj",
        seventh: "none",
        tensions: []
    },
    currentSongId: null,
    selectedBeatElement: null,
    autoSaveTimer: null,
    db: null,
    draggedMeasure: null,
    swipeStartX: 0,
    sampler: null,
    longPressTimer: null,
    isLongPress: false
};

/**
 * SOUND ENGINE (Tone.js)
 */
const soundEngine = {
    init() {
        this.sampler = new Tone.Sampler({
            urls: {
                A0: "A0.mp3", C1: "C1.mp3", "D#1": "Ds1.mp3", "F#1": "Fs1.mp3",
                A1: "A1.mp3", C2: "C2.mp3", "D#2": "Ds2.mp3", "F#2": "Fs2.mp3",
                A2: "A2.mp3", C3: "C3.mp3", "D#3": "Ds3.mp3", "F#3": "Fs3.mp3",
                A3: "A3.mp3", C4: "C4.mp3", "D#4": "Ds4.mp3", "F#4": "Fs4.mp3",
                A4: "A4.mp3", C5: "C5.mp3", "D#5": "Ds5.mp3", "F#5": "Fs5.mp3",
                A5: "A5.mp3", C6: "C6.mp3", "D#6": "Ds6.mp3", "F#6": "Fs6.mp3",
                A6: "A6.mp3", C7: "C7.mp3", "D#7": "Ds7.mp3", "F#7": "Fs7.mp3",
                A7: "A7.mp3", C8: "C8.mp3"
            },
            release: 1,
            baseUrl: "https://tonejs.github.io/audio/salamander/"
        }).toDestination();
    },

    playChord(notesArray) {
        if (!this.sampler) this.init();
        if (Tone.context.state !== 'running') {
            Tone.start();
        }
        if (this.sampler.loaded) {
            this.sampler.triggerAttackRelease(notesArray, "2n");
        }
    }
};

/**
 * THEORY ENGINE (Added Functionality)
 */
const theoryEngine = {
    // キーに応じたダイアトニックコード（Major scale基準）
    getDiatonicChords(keyRoot) {
        const rootIdx = MUSIC_CONSTANTS.NOTE_INDEX_MAP[keyRoot];
        const intervals = [
            { semi: 0, q: "maj", s: "M7" }, // I
            { semi: 2, q: "m",   s: "7"  }, // ii
            { semi: 4, q: "m",   s: "7"  }, // iii
            { semi: 5, q: "maj", s: "M7" }, // IV
            { semi: 7, q: "maj", s: "7"  }, // V
            { semi: 9, q: "m",   s: "7"  }, // vi
            { semi: 11, q: "dim", s: "dim7" } // vii(m7b5に近い代用)
        ];

        const useFlat = keyRoot.includes('b') || ["F", "Bb", "Eb", "Ab", "Db", "Gb"].includes(keyRoot);
        const sourceArray = useFlat ? MUSIC_CONSTANTS.NOTES_FLAT : MUSIC_CONSTANTS.NOTES_FULL;

        return intervals.map(inter => {
            return {
                root: sourceArray[(rootIdx + inter.semi) % 12],
                quality: inter.q,
                seventh: inter.s
            };
        });
    },

    updateRecommendedChords() {
        const key = document.getElementById('songKey').value;
        const container = document.getElementById('keyChordGroup');
        const section = document.getElementById('keyChordSection');
        container.innerHTML = '';
        
        if(!key) {
            section.style.display = 'none';
            return;
        }
        section.style.display = 'block';

        const chords = this.getDiatonicChords(key);
        chords.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'btn-key-chord';
            const detail = chordEngine.getChordDetail({r: c.root, q: c.quality, s: "none", t: []});
            btn.innerText = detail.name;
            btn.onclick = () => {
                appState.currentChord = { root: c.root, quality: c.quality, seventh: "none", tensions: [] };
                uiManager.syncChordSelectorUI();
                chordEngine.calculateAndSync();
            };
            container.appendChild(btn);
        });
    }
};

/**
 * CHORD LOGIC ENGINE
 */
const chordEngine = {
    getChordDetail(data) {
        if (!data || !data.r) return { name: "", notes: "", scientific: [] };
        let intervals = [0]; 
        let displayType = "";
        
        switch(data.q) {
            case "m": intervals.push(3, 7); displayType = "m"; break;
            case "aug": intervals.push(4, 8); displayType = "aug"; break;
            case "dim": intervals.push(3, 6); displayType = "dim"; break;
            case "sus4": intervals.push(5, 7); displayType = "sus4"; break;
            default: intervals.push(4, 7);
        }

        if (data.s === "7") { intervals.push(10); displayType += "7"; }
        else if (data.s === "M7") { intervals.push(11); displayType += "M7"; }
        else if (data.s === "dim7") { intervals.push(9); displayType += "dim7"; }

        data.t.forEach(t => {
            if (t === "b5") { intervals = intervals.filter(i => i !== 7); intervals.push(6); displayType += "(b5)"; }
            if (t === "9" || t === "add9") { intervals.push(14); displayType += t; }
            if (t === "11") { intervals.push(17); displayType += "11"; }
            if (t === "#11") { intervals.push(18); displayType += "(#11)"; }
            if (t === "13") { intervals.push(21); displayType += "13"; }
        });

        const rootIdx = MUSIC_CONSTANTS.NOTE_INDEX_MAP[data.r];
        const uniqueIntervals = [...new Set(intervals.map(i => i % 12))].sort((a,b) => a-b);
        
        // ルート音自体がフラット系かどうかで表示を切り分ける
        const useFlat = data.r.includes('b') || ["F", "Bb", "Eb", "Ab", "Db", "Gb"].includes(data.r);
        const sourceArray = useFlat ? MUSIC_CONSTANTS.NOTES_FLAT : MUSIC_CONSTANTS.NOTES_FULL;
        
        const resNotes = uniqueIntervals.map(i => sourceArray[(rootIdx + i) % 12]);
        const kanaNotes = resNotes.map(n => MUSIC_CONSTANTS.KANA_MAP[n] || n).join(" - ");

        const scientificNotes = intervals.map(inter => {
            const absoluteIdx = rootIdx + inter;
            const noteName = MUSIC_CONSTANTS.NOTES_FULL[absoluteIdx % 12];
            const octave = 3 + Math.floor(absoluteIdx / 12);
            return `${noteName}${octave}`;
        });

        return { name: data.r + displayType, notes: kanaNotes, scientific: scientificNotes };
    },

    calculateAndSync(shouldPlay = true) {
        const detail = this.getChordDetail({
            r: appState.currentChord.root,
            q: appState.currentChord.quality,
            s: appState.currentChord.seventh,
            t: appState.currentChord.tensions
        });
        document.getElementById('chordName').innerText = detail.name;
        document.getElementById('notes').innerText = detail.notes;

        if (appState.selectedBeatElement) {
            appState.selectedBeatElement.querySelector('.beat-chord').innerText = detail.name;
            appState.selectedBeatElement.querySelector('.beat-notes').innerText = detail.notes;
            appState.selectedBeatElement.chordData = {
                r: appState.currentChord.root,
                q: appState.currentChord.quality,
                s: appState.currentChord.seventh,
                t: [...appState.currentChord.tensions]
            };
        }

        if (shouldPlay && detail.scientific.length > 0) {
            soundEngine.playChord(detail.scientific);
        }
    },

    clearChord() {
        if (appState.selectedBeatElement) {
            appState.selectedBeatElement.querySelector('.beat-chord').innerText = "";
            appState.selectedBeatElement.querySelector('.beat-notes').innerText = "";
            appState.selectedBeatElement.chordData = null;
            
            appState.currentChord = {
                root: "C",
                quality: "maj",
                seventh: "none",
                tensions: []
            };
            sheetEditor.closeChordModal();
        }
    }
};

/**
 * SHEET EDITOR UI CONTROLLER
 */
const sheetEditor = {
    addSectionBlock(titleValue = "", isEmpty = false) {
        const master = document.getElementById('masterContainer');
        const section = document.createElement('div');
        section.className = 'section-block';
        
        section.innerHTML = `
            <div class="section-header-container">
                <input type="text" class="section-header-input" placeholder="SECTION NAME" value="${titleValue}" oninput="uiManager.updateSectionNav(); storageManager.requestAutoSave();">
                <div style="display:flex; gap:4px;">
                    <button class="btn-sm" onclick="sheetEditor.moveSection(this.closest('.section-block'), 'up')">▲</button>
                    <button class="btn-sm" onclick="sheetEditor.moveSection(this.closest('.section-block'), 'down')">▼</button>
                    <button class="btn-sm btn-del" onclick="sheetEditor.deleteSection(this.closest('.section-block'))">削除</button>
                </div>
            </div>
            <div class="measure-container"></div>
            <button class="btn-main btn-add-measure" onclick="sheetEditor.addMeasureToSection(this.closest('.section-block'))">+ 小節を追加</button>
        `;
        master.appendChild(section);
        if(!isEmpty) this.addMeasureToSection(section);
        uiManager.updateSectionNav();
        storageManager.requestAutoSave();
    },

    addMeasureToSection(sectionBlock, savedData = null) {
        const container = sectionBlock.querySelector('.measure-container');
        const beatsCount = savedData ? savedData.beats.length : parseInt(document.getElementById('timeSignature').value);
        
        const row = document.createElement('div');
        row.className = 'measure-row';
        row.draggable = true;
        row.innerHTML = `
            <div class="measure-grid"></div>
            <input type="text" class="lyrics-input" placeholder="歌詞..." value="${savedData ? savedData.lyrics : ''}" oninput="storageManager.requestAutoSave()">
        `;
        row.addEventListener('dragstart', (e) => this.handleDragStart(e));
        row.addEventListener('dragover', (e) => this.handleDragOver(e));
        row.addEventListener('drop', (e) => this.handleDrop(e));
        row.addEventListener('dragend', (e) => this.handleDragEnd(e));
        
        row.addEventListener('touchstart', (e) => this.handleTouchStart(e), {passive: true});
        row.addEventListener('touchmove', (e) => this.handleTouchMove(e), {passive: false});
        row.addEventListener('touchend', (e) => this.handleTouchEnd(e));

        const grid = row.querySelector('.measure-grid');
        for (let i = 0; i < beatsCount; i++) {
            grid.appendChild(this.createBeatBox(savedData ? savedData.beats[i] : null));
        }

        container.appendChild(row);
        storageManager.requestAutoSave();
    },

    createBeatBox(data) {
        const beat = document.createElement('div');
        beat.className = 'beat-box';
        const beatData = data || { chord: null };
        beat.chordData = beatData.chord;
        
        const detail = chordEngine.getChordDetail(beatData.chord);
        beat.innerHTML = `
            <div class="chord-display-area">
                <span class="beat-chord">${detail.name}</span>
                <span class="beat-notes">${detail.notes}</span>
            </div>
        `;

        beat.addEventListener('mousedown', (e) => this.startPress(e, beat));
        beat.addEventListener('touchstart', (e) => this.startPress(e, beat), {passive: true});
        beat.addEventListener('mouseup', (e) => this.endPress(e, beat));
        beat.addEventListener('touchend', (e) => this.endPress(e, beat));
        beat.addEventListener('mouseleave', () => this.cancelPress());
        
        return beat;
    },

    startPress(e, beatEl) {
        appState.isLongPress = false;
        if (appState.longPressTimer) clearTimeout(appState.longPressTimer);
        
        appState.longPressTimer = setTimeout(() => {
            appState.isLongPress = true;
            this.handleBeatLongPress(beatEl);
        }, 500);
    },

    endPress(e, beatEl) {
        if (appState.longPressTimer) clearTimeout(appState.longPressTimer);
        if (!appState.isLongPress) {
            this.handleBeatTap(beatEl);
        }
        appState.isLongPress = false;
    },

    cancelPress() {
        if (appState.longPressTimer) clearTimeout(appState.longPressTimer);
    },

    handleBeatTap(beatEl) {
        if (beatEl.chordData) {
            const detail = chordEngine.getChordDetail(beatEl.chordData);
            if (detail.scientific.length > 0) {
                soundEngine.playChord(detail.scientific);
            }
        } else {
            this.openChordModal(beatEl);
        }
    },

    handleBeatLongPress(beatEl) {
        this.openChordModal(beatEl);
    },

    handleDragStart(e) {
        appState.draggedMeasure = e.currentTarget;
        e.currentTarget.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    },
    handleDragOver(e) {
        e.preventDefault();
        const row = e.currentTarget;
        if (row !== appState.draggedMeasure && row.parentElement === appState.draggedMeasure.parentElement) {
            const rect = row.getBoundingClientRect();
            const mid = rect.top + rect.height / 2;
            if (e.clientY < mid) row.parentElement.insertBefore(appState.draggedMeasure, row);
            else row.parentElement.insertBefore(appState.draggedMeasure, row.nextElementSibling);
        }
    },
    handleDrop(e) { e.preventDefault();
    },
    handleDragEnd(e) {
        e.currentTarget.classList.remove('dragging');
        appState.draggedMeasure = null;
        storageManager.requestAutoSave();
    },

    handleTouchStart(e) {
        appState.swipeStartX = e.touches[0].clientX;
        e.currentTarget.classList.add('swiping');
    },
    handleTouchMove(e) {
        const diff = e.touches[0].clientX - appState.swipeStartX;
        if (diff < 0) {
            e.preventDefault();
            e.currentTarget.style.transform = `translateX(${diff}px)`;
            e.currentTarget.style.opacity = 1 - Math.abs(diff/300);
        }
    },
    handleTouchEnd(e) {
        const row = e.currentTarget;
        const diff = e.changedTouches[0].clientX - appState.swipeStartX;
        row.classList.remove('swiping');
        
        if (diff < -100) {
            if (confirm('この小節を削除しますか？')) {
                row.remove();
                storageManager.requestAutoSave();
            } else {
                row.style.transform = '';
                row.style.opacity = '';
            }
        } else {
            row.style.transform = '';
            row.style.opacity = '';
        }
    },

    openChordModal(beatEl) {
        appState.selectedBeatElement = beatEl;
        document.querySelectorAll('.beat-box').forEach(b => b.classList.remove('selected'));
        beatEl.classList.add('selected');

        const data = beatEl.chordData || { r: "C", q: "maj", s: "none", t: [] };
        appState.currentChord = { root: data.r, quality: data.q, seventh: data.s, tensions: [...data.t] };

        uiManager.syncChordSelectorUI();
        theoryEngine.updateRecommendedChords(); // 追記: モーダル開く際にも推奨コード更新
        
        const inner = document.getElementById('selectorInner');
        document.getElementById('selectorTitle').innerText = "コードを選択";
        document.getElementById('modalInjectionPoint').appendChild(inner);
        document.getElementById('modalControls').style.display = 'flex';
        document.getElementById('chordModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
        chordEngine.calculateAndSync(false);
    },

    closeChordModal() {
        document.getElementById('chordModal').style.display = 'none';
        document.body.style.overflow = 'auto';
        document.getElementById('selector').appendChild(document.getElementById('selectorInner'));
        appState.selectedBeatElement = null;
        document.querySelectorAll('.beat-box').forEach(b => b.classList.remove('selected'));
        storageManager.requestAutoSave();
    },

    moveSection(el, dir) {
        const container = document.getElementById('masterContainer');
        if(dir === 'up' && el.previousElementSibling) container.insertBefore(el, el.previousElementSibling);
        if(dir === 'down' && el.nextElementSibling) container.insertBefore(el.nextElementSibling, el);
        uiManager.updateSectionNav();
        storageManager.requestAutoSave();
    },

    deleteSection(el) { if(confirm('セクション全体を削除しますか？')) { el.remove(); uiManager.updateSectionNav(); storageManager.requestAutoSave();
    } },
    
    resetSheetByBeatChange() {
        if(!confirm('拍子を変更すると現在の内容がリセットされます。よろしいですか？')) return;
        document.getElementById('masterContainer').innerHTML = '';
        this.addSectionBlock("Intro");
        uiManager.updateSectionNav();
        storageManager.requestAutoSave();
    }
};

/**
 * UI & TAB MANAGER
 */
const uiManager = {
    switchTab(tabId, noScroll = false) {
        if (appState.autoSaveTimer) storageManager.executeActualSave();
        document.querySelectorAll('.tab, .content').forEach(el => el.classList.remove('active'));
        const targetTab = document.querySelector(`.tab[onclick*="${tabId}"]`);
        if(targetTab) targetTab.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        if (tabId === 'selector') {
            document.getElementById('selector').appendChild(document.getElementById('selectorInner'));
            document.getElementById('modalControls').style.display = 'none';
            document.getElementById('selectorTitle').innerText = "Chord Visualizer 🎹";
            theoryEngine.updateRecommendedChords(); // 追記: タブ切り替え時も更新
        }
        if(!noScroll) window.scrollTo({ top: 0, behavior: 'smooth' });
    },

    updateSectionNav() {
        const nav = document.getElementById('sectionNav');
        nav.innerHTML = '';
        document.querySelectorAll('.section-header-input').forEach((input) => {
            if (input.value.trim() !== "") {
                const btn = document.createElement('div');
                btn.className = 'section-nav-item';
                btn.innerText = input.value;
                btn.onclick = () => input.scrollIntoView({ behavior: 'smooth', block: 'center' });
                nav.appendChild(btn);
            }
        });
    },

    syncChordSelectorUI() {
        document.querySelectorAll('#rootGroup button').forEach(b => b.classList.toggle('active', b.innerText === appState.currentChord.root));
        document.querySelectorAll('#qualityGroup button').forEach(b => b.classList.toggle('active', b.getAttribute('data-val') === appState.currentChord.quality));
        document.querySelectorAll('#seventhGroup button').forEach(b => b.classList.toggle('active', b.getAttribute('data-val') === appState.currentChord.seventh));
        document.querySelectorAll('#tensionGroup button').forEach(b => b.classList.toggle('active', appState.currentChord.tensions.includes(b.getAttribute('data-val'))));
    },

    openSettingsModal() {
        document.getElementById('settingsModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    },

    closeSettingsModal() {
        document.getElementById('settingsModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    },

    syncTitleDisplay() {
        const val = document.getElementById('songTitle').value.trim();
        document.getElementById('displaySongTitle').innerText = val || "無題の楽譜";
    }
};

/**
 * STORAGE MANAGER
 */
const storageManager = {
    DB_NAME: 'ChordSheetDB',
    DB_VERSION: 1,
    STORES: {
        SONGS: 'songs',
        LIBRARY: 'library',
        APP_STATE: 'state'
    },

    initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(this.DB_NAME, this.DB_VERSION);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(this.STORES.SONGS)) db.createObjectStore(this.STORES.SONGS, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(this.STORES.LIBRARY)) db.createObjectStore(this.STORES.LIBRARY, { keyPath: 'id' });
                if (!db.objectStoreNames.contains(this.STORES.APP_STATE)) db.createObjectStore(this.STORES.APP_STATE, { keyPath: 'key' });
            };
            request.onsuccess = (e) => {
                appState.db = e.target.result;
                resolve();
            };
            request.onerror = (e) => reject(e.target.error);
        });
    },

    requestAutoSave() {
        if (appState.autoSaveTimer) clearTimeout(appState.autoSaveTimer);
        appState.autoSaveTimer = setTimeout(() => this.executeActualSave(), 500);
    },

    async executeActualSave() {
        if (!appState.currentSongId || !appState.db) return;
        const songTitle = document.getElementById('songTitle').value.trim() || "無題の楽譜";
        const timeSignature = document.getElementById('timeSignature').value;
        const songKey = document.getElementById('songKey').value; // 追記
        const lastModified = Date.now();
        const sectionsData = Array.from(document.querySelectorAll('.section-block')).map(sb => ({
            title: sb.querySelector('.section-header-input').value,
            measures: Array.from(sb.querySelectorAll('.measure-row')).map(mr => ({
                beats: Array.from(mr.querySelectorAll('.beat-box')).map(bb => ({
                    chord: bb.chordData || null
                })),
                lyrics: mr.querySelector('.lyrics-input').value
            }))
        }));
        const metaData = {
            id: appState.currentSongId,
            title: songTitle,
            timeSignature: timeSignature,
            songKey: songKey, // 追記
            lastModified: lastModified
        };
        const transaction = appState.db.transaction([this.STORES.SONGS, this.STORES.LIBRARY, this.STORES.APP_STATE], 'readwrite');
        transaction.objectStore(this.STORES.SONGS).put({ id: appState.currentSongId, data: sectionsData });
        transaction.objectStore(this.STORES.LIBRARY).put(metaData);
        transaction.objectStore(this.STORES.APP_STATE).put({ key: 'currentEditing', ...metaData, sections: sectionsData });

        return new Promise((resolve) => {
            transaction.oncomplete = () => {
                this.renderSaveList();
                appState.autoSaveTimer = null;
                resolve();
            };
        });
    },

    async createNewSong(confirmFirst = true) {
        if (confirmFirst && !confirm('新しい楽譜を作成しますか？')) return;
        appState.currentSongId = Date.now();
        document.getElementById('songTitle').value = "";
        uiManager.syncTitleDisplay();
        document.getElementById('timeSignature').value = "4";
        document.getElementById('songKey').value = "C"; // 追記
        document.getElementById('masterContainer').innerHTML = '';
        sheetEditor.addSectionBlock("Intro");
        uiManager.updateSectionNav();
        await this.executeActualSave();
        uiManager.switchTab('sheet');
    },

    async loadSheet(id) {
        if (!appState.db) return;
        const tx = appState.db.transaction([this.STORES.SONGS, this.STORES.LIBRARY], 'readonly');
        const metaReq = tx.objectStore(this.STORES.LIBRARY).get(id);
        const dataReq = tx.objectStore(this.STORES.SONGS).get(id);
        tx.oncomplete = () => {
            const meta = metaReq.result;
            const detail = dataReq.result;
            if (!meta) return;
            const fullSongData = { ...meta, sections: detail ? detail.data : [] };
            this.loadDataIntoUI(fullSongData);
            uiManager.switchTab('sheet');
        };
    },

    loadDataIntoUI(song) {
        appState.currentSongId = song.id;
        document.getElementById('songTitle').value = song.title || "";
        uiManager.syncTitleDisplay();
        document.getElementById('timeSignature').value = song.timeSignature;
        document.getElementById('songKey').value = song.songKey || "C"; // 追記
        const master = document.getElementById('masterContainer');
        master.innerHTML = '';
        if(song.sections && song.sections.length > 0) {
            song.sections.forEach(sec => {
                sheetEditor.addSectionBlock(sec.title, true);
                sec.measures.forEach(m => sheetEditor.addMeasureToSection(master.lastElementChild, m));
            });
        } else {
            sheetEditor.addSectionBlock("Intro");
        }
        uiManager.updateSectionNav();
        theoryEngine.updateRecommendedChords(); // 追記
        
        if (appState.db) {
            const tx = appState.db.transaction([this.STORES.APP_STATE], 'readwrite');
            tx.objectStore(this.STORES.APP_STATE).put({ key: 'currentEditing', ...song });
        }
    },

    async deleteSheet(id) {
        if(!confirm('削除してもよろしいですか？')) return;
        const isCurrent = (appState.currentSongId === id);
        
        await new Promise((resolve, reject) => {
            const tx = appState.db.transaction([this.STORES.SONGS, this.STORES.LIBRARY, this.STORES.APP_STATE], 'readwrite');
            tx.objectStore(this.STORES.SONGS).delete(id);
            tx.objectStore(this.STORES.LIBRARY).delete(id);
            if (isCurrent) tx.objectStore(this.STORES.APP_STATE).delete('currentEditing');
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
        });

        if (isCurrent) await this.createNewSong(false);
        else this.renderSaveList();
    },

    async renderSaveList() {
        const container = document.getElementById('saveListContainer');
        if (!appState.db) return;

        const tx = appState.db.transaction([this.STORES.LIBRARY], 'readonly');
        const req = tx.objectStore(this.STORES.LIBRARY).getAll();
        req.onsuccess = () => {
            const libraryIndex = req.result;
            if(libraryIndex.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#999; font-size:0.8rem;">保存された楽譜はありません</p>';
                return;
            }
            
            container.innerHTML = '';
            libraryIndex.sort((a,b) => b.lastModified - a.lastModified).forEach(song => {
                const item = document.createElement('div');
                item.className = 'save-item';
                item.innerHTML = `
                    <div class="save-item-info" onclick="storageManager.loadSheet(${song.id})">
                        <div style="font-weight:bold; color:var(--secondary);">${song.title || '無題'}</div>
                        <div style="font-size:0.7rem; color:#999;">${song.songKey || 'C'} | ${song.timeSignature}/4拍子 | ${new Date(song.lastModified).toLocaleString()}</div>
                    </div>
                    <button class="btn-sm btn-del" onclick="storageManager.deleteSheet(${song.id})">削除</button>
                `;
                container.appendChild(item);
            });
        };
    }
};

/**
 * INITIALIZATION
 */
async function initApp() {
    soundEngine.init();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.error(err));
        });
    }

    // ルート音ボタン生成のロジック（12音をグリッドに敷き詰める）
    const allNotes = ["C", "C#", "Db", "D", "D#", "Eb", "E", "F", "F#", "Gb", "G", "G#", "Ab", "A", "A#", "Bb", "B"];
    const rootGroup = document.getElementById('rootGroup');
    
    allNotes.forEach(note => {
        const btn = document.createElement('button');
        btn.innerText = note;
        btn.className = "btn-root";
        btn.onclick = () => selectRoot(note, btn);
        rootGroup.appendChild(btn);
    });

    function selectRoot(n, btn) {
        document.querySelectorAll(`#rootGroup button`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        appState.currentChord.root = n;
        appState.currentChord.tensions = [];
        uiManager.syncChordSelectorUI();
        chordEngine.calculateAndSync();
    }

    const setupGroup = (groupId, stateKey) => {
        document.querySelectorAll(`#${groupId} button`).forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll(`#${groupId} button`).forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                appState.currentChord[stateKey] = btn.getAttribute('data-val');
                appState.currentChord.tensions = [];
                uiManager.syncChordSelectorUI();
                chordEngine.calculateAndSync();
            };
        });
    };
    setupGroup('qualityGroup', 'quality');
    setupGroup('seventhGroup', 'seventh');

    document.querySelectorAll(`#tensionGroup button`).forEach(btn => {
        btn.onclick = () => {
            const val = btn.getAttribute('data-val');
            const idx = appState.currentChord.tensions.indexOf(val);
            if(idx > -1) appState.currentChord.tensions.splice(idx, 1);
            else appState.currentChord.tensions.push(val);
            btn.classList.toggle('active');
            chordEngine.calculateAndSync();
        };
    });

    try {
        await storageManager.initDB();
        const tx = appState.db.transaction([storageManager.STORES.APP_STATE], 'readonly');
        const req = tx.objectStore(storageManager.STORES.APP_STATE).get('currentEditing');
        req.onsuccess = () => {
            if (req.result) storageManager.loadDataIntoUI(req.result);
            else storageManager.createNewSong(false);
            storageManager.renderSaveList();
            uiManager.switchTab('sheet', true);
        };
    } catch (e) {
        storageManager.createNewSong(false);
        uiManager.switchTab('sheet', true);
    }
}

document.addEventListener('DOMContentLoaded', initApp);
</script>
